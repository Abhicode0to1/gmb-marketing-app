envVarGroups:
  - name: gmb-shared
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: TWILIO_WHATSAPP_FROM
        value: "whatsapp:+14155238886"
      - key: SENDGRID_FROM_EMAIL
        value: "hello@yourcompany.com"
      - key: SENDGRID_FROM_NAME
        value: "Your Company"
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: META_WA_PHONE_NUMBER_ID
        sync: false
      - key: META_WA_ACCESS_TOKEN
        sync: false
      - key: META_WA_VERIFY_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

databases:
  - name: gmb-db
    plan: free
    databaseName: gmbdb
    user: gmbapp

services:
  - type: redis
    name: gmb-redis
    ipAllowList: []
    plan: free
    maxmemoryPolicy: noeviction

  - type: web
    name: gmb-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    plan: free
    healthCheckPath: /health
    envVars:
      - fromGroup: gmb-shared
      - key: DATABASE_URL
        fromDatabase:
          name: gmb-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: gmb-redis
          property: connectionString
      - key: FRONTEND_URL
        sync: false

  - type: worker
    name: gmb-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    plan: free
    envVars:
      - fromGroup: gmb-shared
      - key: DATABASE_URL
        fromDatabase:
          name: gmb-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: gmb-redis
          property: connectionString
      - key: FRONTEND_URL
        value: "placeholder"

  - type: worker
    name: gmb-beat
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: celery -A app.workers.celery_app beat --loglevel=info
    plan: free
    envVars:
      - fromGroup: gmb-shared
      - key: DATABASE_URL
        fromDatabase:
          name: gmb-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: gmb-redis
          property: connectionString
      - key: FRONTEND_URL
        value: "placeholder"

  - type: web
    name: gmb-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
